name: Reservations Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install test-suite dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare pinned SUT clone
        run: npm run setup:sut

      - name: Generate test strategy document
        run: npm run build:docs

      - name: Run automated suite with internal seed and SUT startup
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload JUnit results and raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore

      - name: Upload strategy document
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-document
          path: docs/Test-Strategy-Group-6-Reservations.docx
          if-no-files-found: ignore
